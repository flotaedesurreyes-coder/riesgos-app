name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://riesgos-api-ba5d.onrender.com
          echo " - Backend pinged"
