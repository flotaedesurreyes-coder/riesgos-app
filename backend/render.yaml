services:
  - type: web
    name: riesgos-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: riesgos-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://tuusuario.github.io

databases:
  - name: riesgos-db
    plan: free
